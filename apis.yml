aid: kuma
name: Kuma
description: Kuma is a platform-agnostic open-source service mesh built on top of Envoy proxy. It provides universal connectivity,
  security, and observability for services and microservices running on any infrastructure including Kubernetes and VMs.
type: Index
image: https://kinlane-productions.s3.amazonaws.com/apis-json/apis-json-logo.jpg
tags:
- Envoy
- Kubernetes
- Microservices
- Security
- Service Mesh
