- aid: kuma:kuma-kubernetes-policy-api
  name: Kuma Kubernetes Policy API
  description: Kuma extends the Kubernetes API server with Custom Resource Definitions (CRDs) for defining and managing service
    mesh policies. These resources include MeshTrafficPermission, MeshRetry, MeshTimeout, MeshCircuitBreaker, MeshHealthCheck,
    MeshFaultInjection, and MeshRateLimit, enabling fine-grained traffic management, security, and resilience policies for
    meshed workloads.
  image: https://kinlane-productions.s3.amazonaws.com/apis-json/apis-json-logo.jpg
  humanURL: https://kuma.io/docs/latest/policies/
  tags:
  - CRD
  - Kubernetes
  - Policy
  - Traffic Management
  properties:
  - type: Documentation
    url: https://kuma.io/docs/latest/policies/
  - type: Reference
    url: https://kuma.io/docs/latest/reference/kubernetes-annotations/
- aid: kuma:kuma-multizone-api
  name: Kuma Multizone API
  description: Kuma's Multizone deployment API enables managing service meshes across multiple Kubernetes clusters and Universal
    zones from a single global control plane. It provides resources for zone management, cross-zone traffic routing, and zone
    egress and ingress configuration.
  image: https://kinlane-productions.s3.amazonaws.com/apis-json/apis-json-logo.jpg
  humanURL: https://kuma.io/docs/latest/production/deployment/multi-zone/
  tags:
