naftiko: 1.0.0-alpha2
info:
  label: Kuma API — ZoneIngress
  description: 'Kuma API — ZoneIngress. 4 operations. Lead operation: Returns a list of ZoneIngress in the mesh.. Self-contained
    Naftiko capability covering one Kuma business surface.'
  tags:
  - Kuma
  - ZoneIngress
  created: '2026-05-19'
  modified: '2026-05-19'
binds:
- namespace: env
  keys:
    KUMA_API_KEY: KUMA_API_KEY
capability:
  consumes:
  - type: http
    namespace: kuma-zoneingress
    baseUri: ''
    description: Kuma API — ZoneIngress business capability. Self-contained, no shared references.
    resources:
    - name: zoneingresses
      path: /zoneingresses
      operations:
      - name: getzoneingresslist
        method: GET
        description: Returns a list of ZoneIngress in the mesh.
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: offset
          in: query
          type: integer
          description: offset in the list of entities
        - name: size
          in: query
          type: integer
          description: the number of items per page
        - name: filter
          in: query
          type: object
          description: filter by labels when multiple filters are present, they are ANDed
    - name: zoneingresses-name
      path: /zoneingresses/{name}
      operations:
      - name: deletezoneingress
        method: DELETE
        description: Deletes ZoneIngress entity
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: name
          in: path
          type: string
          description: name of the ZoneIngress
          required: true
      - name: getzoneingress
        method: GET
        description: Returns ZoneIngress entity
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: name
          in: path
          type: string
          description: name of the ZoneIngress
          required: true
      - name: putzoneingress
        method: PUT
        description: Creates or Updates ZoneIngress entity
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: name
          in: path
          type: string
          description: name of the ZoneIngress
          required: true
        - name: body
          in: body
          type: object
          description: Request body (JSON).
          required: true
    authentication:
      type: bearer
      token: '{{env.KUMA_API_KEY}}'
  exposes:
  - type: rest
    namespace: kuma-zoneingress-rest
    port: 8080
    description: REST adapter for Kuma API — ZoneIngress. One Spectral-compliant resource per consumed operation, prefixed
      with /v1.
    resources:
    - path: /v1/zoneingresses
      name: zoneingresses
      description: REST surface for zoneingresses.
      operations:
      - method: GET
        name: getzoneingresslist
        description: Returns a list of ZoneIngress in the mesh.
        call: kuma-zoneingress.getzoneingresslist
        with:
          offset: rest.offset
          size: rest.size
          filter: rest.filter
        outputParameters:
        - type: object
          mapping: $.
    - path: /v1/zoneingresses/{name}
      name: zoneingresses-name
      description: REST surface for zoneingresses-name.
      operations:
      - method: DELETE
        name: deletezoneingress
        description: Deletes ZoneIngress entity
        call: kuma-zoneingress.deletezoneingress
        with:
          name: rest.name
        outputParameters:
        - type: object
          mapping: $.
      - method: GET
        name: getzoneingress
        description: Returns ZoneIngress entity
        call: kuma-zoneingress.getzoneingress
        with:
          name: rest.name
        outputParameters:
        - type: object
          mapping: $.
      - method: PUT
        name: putzoneingress
        description: Creates or Updates ZoneIngress entity
        call: kuma-zoneingress.putzoneingress
        with:
          name: rest.name
          body: rest.body
        outputParameters:
        - type: object
          mapping: $.
  - type: mcp
    namespace: kuma-zoneingress-mcp
    port: 9090
    transport: http
    description: MCP adapter for Kuma API — ZoneIngress. One tool per consumed operation, routed inline through this capability's
      consumes block.
    tools:
    - name: returns-list-zoneingress-mesh
      description: Returns a list of ZoneIngress in the mesh.
      hints:
        readOnly: true
        destructive: false
        idempotent: true
      call: kuma-zoneingress.getzoneingresslist
      with:
        offset: tools.offset
        size: tools.size
        filter: tools.filter
      outputParameters:
      - type: object
        mapping: $.
    - name: deletes-zoneingress-entity
      description: Deletes ZoneIngress entity
      hints:
        readOnly: false
        destructive: true
        idempotent: true
      call: kuma-zoneingress.deletezoneingress
      with:
        name: tools.name
      outputParameters:
      - type: object
        mapping: $.
    - name: returns-zoneingress-entity
      description: Returns ZoneIngress entity
      hints:
        readOnly: true
        destructive: false
        idempotent: true
      call: kuma-zoneingress.getzoneingress
      with:
        name: tools.name
      outputParameters:
      - type: object
        mapping: $.
    - name: creates-updates-zoneingress-entity
      description: Creates or Updates ZoneIngress entity
      hints:
        readOnly: false
        destructive: false
        idempotent: true
      call: kuma-zoneingress.putzoneingress
      with:
        name: tools.name
        body: tools.body
      outputParameters:
      - type: object
        mapping: $.
