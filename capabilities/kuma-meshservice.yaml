naftiko: 1.0.0-alpha2
info:
  label: Kuma API — MeshService
  description: 'Kuma API — MeshService. 4 operations. Lead operation: Returns a list of MeshService in the mesh.. Self-contained
    Naftiko capability covering one Kuma business surface.'
  tags:
  - Kuma
  - MeshService
  created: '2026-05-19'
  modified: '2026-05-19'
binds:
- namespace: env
  keys:
    KUMA_API_KEY: KUMA_API_KEY
capability:
  consumes:
  - type: http
    namespace: kuma-meshservice
    baseUri: ''
    description: Kuma API — MeshService business capability. Self-contained, no shared references.
    resources:
    - name: meshes-mesh-meshservices
      path: /meshes/{mesh}/meshservices
      operations:
      - name: getmeshservicelist
        method: GET
        description: Returns a list of MeshService in the mesh.
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: offset
          in: query
          type: integer
          description: offset in the list of entities
        - name: size
          in: query
          type: integer
          description: the number of items per page
        - name: filter
          in: query
          type: object
          description: filter by labels when multiple filters are present, they are ANDed
        - name: mesh
          in: path
          type: string
          description: name of the mesh
          required: true
    - name: meshes-mesh-meshservices-name
      path: /meshes/{mesh}/meshservices/{name}
      operations:
      - name: getmeshservice
        method: GET
        description: Returns MeshService entity
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: mesh
          in: path
          type: string
          description: name of the mesh
          required: true
        - name: name
          in: path
          type: string
          description: name of the MeshService
          required: true
      - name: putmeshservice
        method: PUT
        description: Creates or Updates MeshService entity
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: mesh
          in: path
          type: string
          description: name of the mesh
          required: true
        - name: name
          in: path
          type: string
          description: name of the MeshService
          required: true
        - name: body
          in: body
          type: object
          description: Request body (JSON).
          required: true
      - name: deletemeshservice
        method: DELETE
        description: Deletes MeshService entity
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: mesh
          in: path
          type: string
          description: name of the mesh
          required: true
        - name: name
          in: path
          type: string
          description: name of the MeshService
          required: true
    authentication:
      type: bearer
      token: '{{env.KUMA_API_KEY}}'
  exposes:
  - type: rest
    namespace: kuma-meshservice-rest
    port: 8080
    description: REST adapter for Kuma API — MeshService. One Spectral-compliant resource per consumed operation, prefixed
      with /v1.
    resources:
    - path: /v1/meshes/{mesh}/meshservices
      name: meshes-mesh-meshservices
      description: REST surface for meshes-mesh-meshservices.
      operations:
      - method: GET
        name: getmeshservicelist
        description: Returns a list of MeshService in the mesh.
        call: kuma-meshservice.getmeshservicelist
        with:
          offset: rest.offset
          size: rest.size
          filter: rest.filter
          mesh: rest.mesh
        outputParameters:
        - type: object
          mapping: $.
    - path: /v1/meshes/{mesh}/meshservices/{name}
      name: meshes-mesh-meshservices-name
      description: REST surface for meshes-mesh-meshservices-name.
      operations:
      - method: GET
        name: getmeshservice
        description: Returns MeshService entity
        call: kuma-meshservice.getmeshservice
        with:
          mesh: rest.mesh
          name: rest.name
        outputParameters:
        - type: object
          mapping: $.
      - method: PUT
        name: putmeshservice
        description: Creates or Updates MeshService entity
        call: kuma-meshservice.putmeshservice
        with:
          mesh: rest.mesh
          name: rest.name
          body: rest.body
        outputParameters:
        - type: object
          mapping: $.
      - method: DELETE
        name: deletemeshservice
        description: Deletes MeshService entity
        call: kuma-meshservice.deletemeshservice
        with:
          mesh: rest.mesh
          name: rest.name
        outputParameters:
        - type: object
          mapping: $.
  - type: mcp
    namespace: kuma-meshservice-mcp
    port: 9090
    transport: http
    description: MCP adapter for Kuma API — MeshService. One tool per consumed operation, routed inline through this capability's
      consumes block.
    tools:
    - name: returns-list-meshservice-mesh
      description: Returns a list of MeshService in the mesh.
      hints:
        readOnly: true
        destructive: false
        idempotent: true
      call: kuma-meshservice.getmeshservicelist
      with:
        offset: tools.offset
        size: tools.size
        filter: tools.filter
        mesh: tools.mesh
      outputParameters:
      - type: object
        mapping: $.
    - name: returns-meshservice-entity
      description: Returns MeshService entity
      hints:
        readOnly: true
        destructive: false
        idempotent: true
      call: kuma-meshservice.getmeshservice
      with:
        mesh: tools.mesh
        name: tools.name
      outputParameters:
      - type: object
        mapping: $.
    - name: creates-updates-meshservice-entity
      description: Creates or Updates MeshService entity
      hints:
        readOnly: false
        destructive: false
        idempotent: true
      call: kuma-meshservice.putmeshservice
      with:
        mesh: tools.mesh
        name: tools.name
        body: tools.body
      outputParameters:
      - type: object
        mapping: $.
    - name: deletes-meshservice-entity
      description: Deletes MeshService entity
      hints:
        readOnly: false
        destructive: true
        idempotent: true
      call: kuma-meshservice.deletemeshservice
      with:
        mesh: tools.mesh
        name: tools.name
      outputParameters:
      - type: object
        mapping: $.
