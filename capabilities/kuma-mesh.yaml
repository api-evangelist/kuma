naftiko: 1.0.0-alpha2
info:
  label: Kuma API — Mesh
  description: 'Kuma API — Mesh. 4 operations. Lead operation: Returns a list of Mesh in the mesh.. Self-contained Naftiko
    capability covering one Kuma business surface.'
  tags:
  - Kuma
  - Mesh
  created: '2026-05-19'
  modified: '2026-05-19'
binds:
- namespace: env
  keys:
    KUMA_API_KEY: KUMA_API_KEY
capability:
  consumes:
  - type: http
    namespace: kuma-mesh
    baseUri: ''
    description: Kuma API — Mesh business capability. Self-contained, no shared references.
    resources:
    - name: meshes
      path: /meshes
      operations:
      - name: getmeshlist
        method: GET
        description: Returns a list of Mesh in the mesh.
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: offset
          in: query
          type: integer
          description: offset in the list of entities
        - name: size
          in: query
          type: integer
          description: the number of items per page
        - name: filter
          in: query
          type: object
          description: filter by labels when multiple filters are present, they are ANDed
    - name: meshes-name
      path: /meshes/{name}
      operations:
      - name: deletemesh
        method: DELETE
        description: Deletes Mesh entity
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: name
          in: path
          type: string
          description: name of the Mesh
          required: true
      - name: getmesh
        method: GET
        description: Returns Mesh entity
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: name
          in: path
          type: string
          description: name of the Mesh
          required: true
      - name: putmesh
        method: PUT
        description: Creates or Updates Mesh entity
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: name
          in: path
          type: string
          description: name of the Mesh
          required: true
        - name: body
          in: body
          type: object
          description: Request body (JSON).
          required: true
    authentication:
      type: bearer
      token: '{{env.KUMA_API_KEY}}'
  exposes:
  - type: rest
    namespace: kuma-mesh-rest
    port: 8080
    description: REST adapter for Kuma API — Mesh. One Spectral-compliant resource per consumed operation, prefixed with /v1.
    resources:
    - path: /v1/meshes
      name: meshes
      description: REST surface for meshes.
      operations:
      - method: GET
        name: getmeshlist
        description: Returns a list of Mesh in the mesh.
        call: kuma-mesh.getmeshlist
        with:
          offset: rest.offset
          size: rest.size
          filter: rest.filter
        outputParameters:
        - type: object
          mapping: $.
    - path: /v1/meshes/{name}
      name: meshes-name
      description: REST surface for meshes-name.
      operations:
      - method: DELETE
        name: deletemesh
        description: Deletes Mesh entity
        call: kuma-mesh.deletemesh
        with:
          name: rest.name
        outputParameters:
        - type: object
          mapping: $.
      - method: GET
        name: getmesh
        description: Returns Mesh entity
        call: kuma-mesh.getmesh
        with:
          name: rest.name
        outputParameters:
        - type: object
          mapping: $.
      - method: PUT
        name: putmesh
        description: Creates or Updates Mesh entity
        call: kuma-mesh.putmesh
        with:
          name: rest.name
          body: rest.body
        outputParameters:
        - type: object
          mapping: $.
  - type: mcp
    namespace: kuma-mesh-mcp
    port: 9090
    transport: http
    description: MCP adapter for Kuma API — Mesh. One tool per consumed operation, routed inline through this capability's
      consumes block.
    tools:
    - name: returns-list-mesh-mesh
      description: Returns a list of Mesh in the mesh.
      hints:
        readOnly: true
        destructive: false
        idempotent: true
      call: kuma-mesh.getmeshlist
      with:
        offset: tools.offset
        size: tools.size
        filter: tools.filter
      outputParameters:
      - type: object
        mapping: $.
    - name: deletes-mesh-entity
      description: Deletes Mesh entity
      hints:
        readOnly: false
        destructive: true
        idempotent: true
      call: kuma-mesh.deletemesh
      with:
        name: tools.name
      outputParameters:
      - type: object
        mapping: $.
    - name: returns-mesh-entity
      description: Returns Mesh entity
      hints:
        readOnly: true
        destructive: false
        idempotent: true
      call: kuma-mesh.getmesh
      with:
        name: tools.name
      outputParameters:
      - type: object
        mapping: $.
    - name: creates-updates-mesh-entity
      description: Creates or Updates Mesh entity
      hints:
        readOnly: false
        destructive: false
        idempotent: true
      call: kuma-mesh.putmesh
      with:
        name: tools.name
        body: tools.body
      outputParameters:
      - type: object
        mapping: $.
