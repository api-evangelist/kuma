naftiko: 1.0.0-alpha2
info:
  label: Kuma API — MeshGateway
  description: 'Kuma API — MeshGateway. 4 operations. Lead operation: Returns a list of MeshGateway in the mesh.. Self-contained
    Naftiko capability covering one Kuma business surface.'
  tags:
  - Kuma
  - MeshGateway
  created: '2026-05-19'
  modified: '2026-05-19'
binds:
- namespace: env
  keys:
    KUMA_API_KEY: KUMA_API_KEY
capability:
  consumes:
  - type: http
    namespace: kuma-meshgateway
    baseUri: ''
    description: Kuma API — MeshGateway business capability. Self-contained, no shared references.
    resources:
    - name: meshes-mesh-meshgateways
      path: /meshes/{mesh}/meshgateways
      operations:
      - name: getmeshgatewaylist
        method: GET
        description: Returns a list of MeshGateway in the mesh.
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: offset
          in: query
          type: integer
          description: offset in the list of entities
        - name: size
          in: query
          type: integer
          description: the number of items per page
        - name: filter
          in: query
          type: object
          description: filter by labels when multiple filters are present, they are ANDed
        - name: mesh
          in: path
          type: string
          description: name of the mesh
          required: true
    - name: meshes-mesh-meshgateways-name
      path: /meshes/{mesh}/meshgateways/{name}
      operations:
      - name: deletemeshgateway
        method: DELETE
        description: Deletes MeshGateway entity
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: mesh
          in: path
          type: string
          description: name of the mesh
          required: true
        - name: name
          in: path
          type: string
          description: name of the MeshGateway
          required: true
      - name: getmeshgateway
        method: GET
        description: Returns MeshGateway entity
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: mesh
          in: path
          type: string
          description: name of the mesh
          required: true
        - name: name
          in: path
          type: string
          description: name of the MeshGateway
          required: true
      - name: putmeshgateway
        method: PUT
        description: Creates or Updates MeshGateway entity
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: mesh
          in: path
          type: string
          description: name of the mesh
          required: true
        - name: name
          in: path
          type: string
          description: name of the MeshGateway
          required: true
        - name: body
          in: body
          type: object
          description: Request body (JSON).
          required: true
    authentication:
      type: bearer
      token: '{{env.KUMA_API_KEY}}'
  exposes:
  - type: rest
    namespace: kuma-meshgateway-rest
    port: 8080
    description: REST adapter for Kuma API — MeshGateway. One Spectral-compliant resource per consumed operation, prefixed
      with /v1.
    resources:
    - path: /v1/meshes/{mesh}/meshgateways
      name: meshes-mesh-meshgateways
      description: REST surface for meshes-mesh-meshgateways.
      operations:
      - method: GET
        name: getmeshgatewaylist
        description: Returns a list of MeshGateway in the mesh.
        call: kuma-meshgateway.getmeshgatewaylist
        with:
          offset: rest.offset
          size: rest.size
          filter: rest.filter
          mesh: rest.mesh
        outputParameters:
        - type: object
          mapping: $.
    - path: /v1/meshes/{mesh}/meshgateways/{name}
      name: meshes-mesh-meshgateways-name
      description: REST surface for meshes-mesh-meshgateways-name.
      operations:
      - method: DELETE
        name: deletemeshgateway
        description: Deletes MeshGateway entity
        call: kuma-meshgateway.deletemeshgateway
        with:
          mesh: rest.mesh
          name: rest.name
        outputParameters:
        - type: object
          mapping: $.
      - method: GET
        name: getmeshgateway
        description: Returns MeshGateway entity
        call: kuma-meshgateway.getmeshgateway
        with:
          mesh: rest.mesh
          name: rest.name
        outputParameters:
        - type: object
          mapping: $.
      - method: PUT
        name: putmeshgateway
        description: Creates or Updates MeshGateway entity
        call: kuma-meshgateway.putmeshgateway
        with:
          mesh: rest.mesh
          name: rest.name
          body: rest.body
        outputParameters:
        - type: object
          mapping: $.
  - type: mcp
    namespace: kuma-meshgateway-mcp
    port: 9090
    transport: http
    description: MCP adapter for Kuma API — MeshGateway. One tool per consumed operation, routed inline through this capability's
      consumes block.
    tools:
    - name: returns-list-meshgateway-mesh
      description: Returns a list of MeshGateway in the mesh.
      hints:
        readOnly: true
        destructive: false
        idempotent: true
      call: kuma-meshgateway.getmeshgatewaylist
      with:
        offset: tools.offset
        size: tools.size
        filter: tools.filter
        mesh: tools.mesh
      outputParameters:
      - type: object
        mapping: $.
    - name: deletes-meshgateway-entity
      description: Deletes MeshGateway entity
      hints:
        readOnly: false
        destructive: true
        idempotent: true
      call: kuma-meshgateway.deletemeshgateway
      with:
        mesh: tools.mesh
        name: tools.name
      outputParameters:
      - type: object
        mapping: $.
    - name: returns-meshgateway-entity
      description: Returns MeshGateway entity
      hints:
        readOnly: true
        destructive: false
        idempotent: true
      call: kuma-meshgateway.getmeshgateway
      with:
        mesh: tools.mesh
        name: tools.name
      outputParameters:
      - type: object
        mapping: $.
    - name: creates-updates-meshgateway-entity
      description: Creates or Updates MeshGateway entity
      hints:
        readOnly: false
        destructive: false
        idempotent: true
      call: kuma-meshgateway.putmeshgateway
      with:
        mesh: tools.mesh
        name: tools.name
        body: tools.body
      outputParameters:
      - type: object
        mapping: $.
