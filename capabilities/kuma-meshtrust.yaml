naftiko: 1.0.0-alpha2
info:
  label: Kuma API — MeshTrust
  description: 'Kuma API — MeshTrust. 4 operations. Lead operation: Returns a list of MeshTrust in the mesh.. Self-contained
    Naftiko capability covering one Kuma business surface.'
  tags:
  - Kuma
  - MeshTrust
  created: '2026-05-19'
  modified: '2026-05-19'
binds:
- namespace: env
  keys:
    KUMA_API_KEY: KUMA_API_KEY
capability:
  consumes:
  - type: http
    namespace: kuma-meshtrust
    baseUri: ''
    description: Kuma API — MeshTrust business capability. Self-contained, no shared references.
    resources:
    - name: meshes-mesh-meshtrusts
      path: /meshes/{mesh}/meshtrusts
      operations:
      - name: getmeshtrustlist
        method: GET
        description: Returns a list of MeshTrust in the mesh.
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: offset
          in: query
          type: integer
          description: offset in the list of entities
        - name: size
          in: query
          type: integer
          description: the number of items per page
        - name: filter
          in: query
          type: object
          description: filter by labels when multiple filters are present, they are ANDed
        - name: mesh
          in: path
          type: string
          description: name of the mesh
          required: true
    - name: meshes-mesh-meshtrusts-name
      path: /meshes/{mesh}/meshtrusts/{name}
      operations:
      - name: getmeshtrust
        method: GET
        description: Returns MeshTrust entity
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: mesh
          in: path
          type: string
          description: name of the mesh
          required: true
        - name: name
          in: path
          type: string
          description: name of the MeshTrust
          required: true
      - name: putmeshtrust
        method: PUT
        description: Creates or Updates MeshTrust entity
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: mesh
          in: path
          type: string
          description: name of the mesh
          required: true
        - name: name
          in: path
          type: string
          description: name of the MeshTrust
          required: true
        - name: body
          in: body
          type: object
          description: Request body (JSON).
          required: true
      - name: deletemeshtrust
        method: DELETE
        description: Deletes MeshTrust entity
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: mesh
          in: path
          type: string
          description: name of the mesh
          required: true
        - name: name
          in: path
          type: string
          description: name of the MeshTrust
          required: true
    authentication:
      type: bearer
      token: '{{env.KUMA_API_KEY}}'
  exposes:
  - type: rest
    namespace: kuma-meshtrust-rest
    port: 8080
    description: REST adapter for Kuma API — MeshTrust. One Spectral-compliant resource per consumed operation, prefixed with
      /v1.
    resources:
    - path: /v1/meshes/{mesh}/meshtrusts
      name: meshes-mesh-meshtrusts
      description: REST surface for meshes-mesh-meshtrusts.
      operations:
      - method: GET
        name: getmeshtrustlist
        description: Returns a list of MeshTrust in the mesh.
        call: kuma-meshtrust.getmeshtrustlist
        with:
          offset: rest.offset
          size: rest.size
          filter: rest.filter
          mesh: rest.mesh
        outputParameters:
        - type: object
          mapping: $.
    - path: /v1/meshes/{mesh}/meshtrusts/{name}
      name: meshes-mesh-meshtrusts-name
      description: REST surface for meshes-mesh-meshtrusts-name.
      operations:
      - method: GET
        name: getmeshtrust
        description: Returns MeshTrust entity
        call: kuma-meshtrust.getmeshtrust
        with:
          mesh: rest.mesh
          name: rest.name
        outputParameters:
        - type: object
          mapping: $.
      - method: PUT
        name: putmeshtrust
        description: Creates or Updates MeshTrust entity
        call: kuma-meshtrust.putmeshtrust
        with:
          mesh: rest.mesh
          name: rest.name
          body: rest.body
        outputParameters:
        - type: object
          mapping: $.
      - method: DELETE
        name: deletemeshtrust
        description: Deletes MeshTrust entity
        call: kuma-meshtrust.deletemeshtrust
        with:
          mesh: rest.mesh
          name: rest.name
        outputParameters:
        - type: object
          mapping: $.
  - type: mcp
    namespace: kuma-meshtrust-mcp
    port: 9090
    transport: http
    description: MCP adapter for Kuma API — MeshTrust. One tool per consumed operation, routed inline through this capability's
      consumes block.
    tools:
    - name: returns-list-meshtrust-mesh
      description: Returns a list of MeshTrust in the mesh.
      hints:
        readOnly: true
        destructive: false
        idempotent: true
      call: kuma-meshtrust.getmeshtrustlist
      with:
        offset: tools.offset
        size: tools.size
        filter: tools.filter
        mesh: tools.mesh
      outputParameters:
      - type: object
        mapping: $.
    - name: returns-meshtrust-entity
      description: Returns MeshTrust entity
      hints:
        readOnly: true
        destructive: false
        idempotent: true
      call: kuma-meshtrust.getmeshtrust
      with:
        mesh: tools.mesh
        name: tools.name
      outputParameters:
      - type: object
        mapping: $.
    - name: creates-updates-meshtrust-entity
      description: Creates or Updates MeshTrust entity
      hints:
        readOnly: false
        destructive: false
        idempotent: true
      call: kuma-meshtrust.putmeshtrust
      with:
        mesh: tools.mesh
        name: tools.name
        body: tools.body
      outputParameters:
      - type: object
        mapping: $.
    - name: deletes-meshtrust-entity
      description: Deletes MeshTrust entity
      hints:
        readOnly: false
        destructive: true
        idempotent: true
      call: kuma-meshtrust.deletemeshtrust
      with:
        mesh: tools.mesh
        name: tools.name
      outputParameters:
      - type: object
        mapping: $.
