naftiko: 1.0.0-alpha2
info:
  label: Kuma API — MeshMetric
  description: 'Kuma API — MeshMetric. 4 operations. Lead operation: Returns a list of MeshMetric in the mesh.. Self-contained
    Naftiko capability covering one Kuma business surface.'
  tags:
  - Kuma
  - MeshMetric
  created: '2026-05-19'
  modified: '2026-05-19'
binds:
- namespace: env
  keys:
    KUMA_API_KEY: KUMA_API_KEY
capability:
  consumes:
  - type: http
    namespace: kuma-meshmetric
    baseUri: ''
    description: Kuma API — MeshMetric business capability. Self-contained, no shared references.
    resources:
    - name: meshes-mesh-meshmetrics
      path: /meshes/{mesh}/meshmetrics
      operations:
      - name: getmeshmetriclist
        method: GET
        description: Returns a list of MeshMetric in the mesh.
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: offset
          in: query
          type: integer
          description: offset in the list of entities
        - name: size
          in: query
          type: integer
          description: the number of items per page
        - name: filter
          in: query
          type: object
          description: filter by labels when multiple filters are present, they are ANDed
        - name: mesh
          in: path
          type: string
          description: name of the mesh
          required: true
    - name: meshes-mesh-meshmetrics-name
      path: /meshes/{mesh}/meshmetrics/{name}
      operations:
      - name: getmeshmetric
        method: GET
        description: Returns MeshMetric entity
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: mesh
          in: path
          type: string
          description: name of the mesh
          required: true
        - name: name
          in: path
          type: string
          description: name of the MeshMetric
          required: true
      - name: putmeshmetric
        method: PUT
        description: Creates or Updates MeshMetric entity
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: mesh
          in: path
          type: string
          description: name of the mesh
          required: true
        - name: name
          in: path
          type: string
          description: name of the MeshMetric
          required: true
        - name: body
          in: body
          type: object
          description: Request body (JSON).
          required: true
      - name: deletemeshmetric
        method: DELETE
        description: Deletes MeshMetric entity
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: mesh
          in: path
          type: string
          description: name of the mesh
          required: true
        - name: name
          in: path
          type: string
          description: name of the MeshMetric
          required: true
    authentication:
      type: bearer
      token: '{{env.KUMA_API_KEY}}'
  exposes:
  - type: rest
    namespace: kuma-meshmetric-rest
    port: 8080
    description: REST adapter for Kuma API — MeshMetric. One Spectral-compliant resource per consumed operation, prefixed
      with /v1.
    resources:
    - path: /v1/meshes/{mesh}/meshmetrics
      name: meshes-mesh-meshmetrics
      description: REST surface for meshes-mesh-meshmetrics.
      operations:
      - method: GET
        name: getmeshmetriclist
        description: Returns a list of MeshMetric in the mesh.
        call: kuma-meshmetric.getmeshmetriclist
        with:
          offset: rest.offset
          size: rest.size
          filter: rest.filter
          mesh: rest.mesh
        outputParameters:
        - type: object
          mapping: $.
    - path: /v1/meshes/{mesh}/meshmetrics/{name}
      name: meshes-mesh-meshmetrics-name
      description: REST surface for meshes-mesh-meshmetrics-name.
      operations:
      - method: GET
        name: getmeshmetric
        description: Returns MeshMetric entity
        call: kuma-meshmetric.getmeshmetric
        with:
          mesh: rest.mesh
          name: rest.name
        outputParameters:
        - type: object
          mapping: $.
      - method: PUT
        name: putmeshmetric
        description: Creates or Updates MeshMetric entity
        call: kuma-meshmetric.putmeshmetric
        with:
          mesh: rest.mesh
          name: rest.name
          body: rest.body
        outputParameters:
        - type: object
          mapping: $.
      - method: DELETE
        name: deletemeshmetric
        description: Deletes MeshMetric entity
        call: kuma-meshmetric.deletemeshmetric
        with:
          mesh: rest.mesh
          name: rest.name
        outputParameters:
        - type: object
          mapping: $.
  - type: mcp
    namespace: kuma-meshmetric-mcp
    port: 9090
    transport: http
    description: MCP adapter for Kuma API — MeshMetric. One tool per consumed operation, routed inline through this capability's
      consumes block.
    tools:
    - name: returns-list-meshmetric-mesh
      description: Returns a list of MeshMetric in the mesh.
      hints:
        readOnly: true
        destructive: false
        idempotent: true
      call: kuma-meshmetric.getmeshmetriclist
      with:
        offset: tools.offset
        size: tools.size
        filter: tools.filter
        mesh: tools.mesh
      outputParameters:
      - type: object
        mapping: $.
    - name: returns-meshmetric-entity
      description: Returns MeshMetric entity
      hints:
        readOnly: true
        destructive: false
        idempotent: true
      call: kuma-meshmetric.getmeshmetric
      with:
        mesh: tools.mesh
        name: tools.name
      outputParameters:
      - type: object
        mapping: $.
    - name: creates-updates-meshmetric-entity
      description: Creates or Updates MeshMetric entity
      hints:
        readOnly: false
        destructive: false
        idempotent: true
      call: kuma-meshmetric.putmeshmetric
      with:
        mesh: tools.mesh
        name: tools.name
        body: tools.body
      outputParameters:
      - type: object
        mapping: $.
    - name: deletes-meshmetric-entity
      description: Deletes MeshMetric entity
      hints:
        readOnly: false
        destructive: true
        idempotent: true
      call: kuma-meshmetric.deletemeshmetric
      with:
        mesh: tools.mesh
        name: tools.name
      outputParameters:
      - type: object
        mapping: $.
