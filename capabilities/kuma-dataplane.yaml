naftiko: 1.0.0-alpha2
info:
  label: Kuma API — Dataplane
  description: 'Kuma API — Dataplane. 4 operations. Lead operation: Returns a list of Dataplane in the mesh.. Self-contained
    Naftiko capability covering one Kuma business surface.'
  tags:
  - Kuma
  - Dataplane
  created: '2026-05-19'
  modified: '2026-05-19'
binds:
- namespace: env
  keys:
    KUMA_API_KEY: KUMA_API_KEY
capability:
  consumes:
  - type: http
    namespace: kuma-dataplane
    baseUri: ''
    description: Kuma API — Dataplane business capability. Self-contained, no shared references.
    resources:
    - name: meshes-mesh-dataplanes
      path: /meshes/{mesh}/dataplanes
      operations:
      - name: getdataplanelist
        method: GET
        description: Returns a list of Dataplane in the mesh.
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: offset
          in: query
          type: integer
          description: offset in the list of entities
        - name: size
          in: query
          type: integer
          description: the number of items per page
        - name: filter
          in: query
          type: object
          description: filter by labels when multiple filters are present, they are ANDed
        - name: mesh
          in: path
          type: string
          description: name of the mesh
          required: true
    - name: meshes-mesh-dataplanes-name
      path: /meshes/{mesh}/dataplanes/{name}
      operations:
      - name: deletedataplane
        method: DELETE
        description: Deletes Dataplane entity
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: mesh
          in: path
          type: string
          description: name of the mesh
          required: true
        - name: name
          in: path
          type: string
          description: name of the Dataplane
          required: true
      - name: getdataplane
        method: GET
        description: Returns Dataplane entity
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: mesh
          in: path
          type: string
          description: name of the mesh
          required: true
        - name: name
          in: path
          type: string
          description: name of the Dataplane
          required: true
      - name: putdataplane
        method: PUT
        description: Creates or Updates Dataplane entity
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: mesh
          in: path
          type: string
          description: name of the mesh
          required: true
        - name: name
          in: path
          type: string
          description: name of the Dataplane
          required: true
        - name: body
          in: body
          type: object
          description: Request body (JSON).
          required: true
    authentication:
      type: bearer
      token: '{{env.KUMA_API_KEY}}'
  exposes:
  - type: rest
    namespace: kuma-dataplane-rest
    port: 8080
    description: REST adapter for Kuma API — Dataplane. One Spectral-compliant resource per consumed operation, prefixed with
      /v1.
    resources:
    - path: /v1/meshes/{mesh}/dataplanes
      name: meshes-mesh-dataplanes
      description: REST surface for meshes-mesh-dataplanes.
      operations:
      - method: GET
        name: getdataplanelist
        description: Returns a list of Dataplane in the mesh.
        call: kuma-dataplane.getdataplanelist
        with:
          offset: rest.offset
          size: rest.size
          filter: rest.filter
          mesh: rest.mesh
        outputParameters:
        - type: object
          mapping: $.
    - path: /v1/meshes/{mesh}/dataplanes/{name}
      name: meshes-mesh-dataplanes-name
      description: REST surface for meshes-mesh-dataplanes-name.
      operations:
      - method: DELETE
        name: deletedataplane
        description: Deletes Dataplane entity
        call: kuma-dataplane.deletedataplane
        with:
          mesh: rest.mesh
          name: rest.name
        outputParameters:
        - type: object
          mapping: $.
      - method: GET
        name: getdataplane
        description: Returns Dataplane entity
        call: kuma-dataplane.getdataplane
        with:
          mesh: rest.mesh
          name: rest.name
        outputParameters:
        - type: object
          mapping: $.
      - method: PUT
        name: putdataplane
        description: Creates or Updates Dataplane entity
        call: kuma-dataplane.putdataplane
        with:
          mesh: rest.mesh
          name: rest.name
          body: rest.body
        outputParameters:
        - type: object
          mapping: $.
  - type: mcp
    namespace: kuma-dataplane-mcp
    port: 9090
    transport: http
    description: MCP adapter for Kuma API — Dataplane. One tool per consumed operation, routed inline through this capability's
      consumes block.
    tools:
    - name: returns-list-dataplane-mesh
      description: Returns a list of Dataplane in the mesh.
      hints:
        readOnly: true
        destructive: false
        idempotent: true
      call: kuma-dataplane.getdataplanelist
      with:
        offset: tools.offset
        size: tools.size
        filter: tools.filter
        mesh: tools.mesh
      outputParameters:
      - type: object
        mapping: $.
    - name: deletes-dataplane-entity
      description: Deletes Dataplane entity
      hints:
        readOnly: false
        destructive: true
        idempotent: true
      call: kuma-dataplane.deletedataplane
      with:
        mesh: tools.mesh
        name: tools.name
      outputParameters:
      - type: object
        mapping: $.
    - name: returns-dataplane-entity
      description: Returns Dataplane entity
      hints:
        readOnly: true
        destructive: false
        idempotent: true
      call: kuma-dataplane.getdataplane
      with:
        mesh: tools.mesh
        name: tools.name
      outputParameters:
      - type: object
        mapping: $.
    - name: creates-updates-dataplane-entity
      description: Creates or Updates Dataplane entity
      hints:
        readOnly: false
        destructive: false
        idempotent: true
      call: kuma-dataplane.putdataplane
      with:
        mesh: tools.mesh
        name: tools.name
        body: tools.body
      outputParameters:
      - type: object
        mapping: $.
