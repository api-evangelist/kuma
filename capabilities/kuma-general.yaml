      description: REST surface for meshes-mesh-dataplanes-_overview.
      operations:
      - method: GET
        name: getdataplaneoverviewlist
        description: getdataplaneoverviewlist
        call: kuma-general.getdataplaneoverviewlist
        with:
          mesh: rest.mesh
        outputParameters:
        - type: object
          mapping: $.
