naftiko: 1.0.0-alpha2
info:
  label: Kuma API — MeshTimeout
  description: 'Kuma API — MeshTimeout. 4 operations. Lead operation: Returns a list of MeshTimeout in the mesh.. Self-contained
    Naftiko capability covering one Kuma business surface.'
  tags:
  - Kuma
  - MeshTimeout
  created: '2026-05-19'
  modified: '2026-05-19'
binds:
- namespace: env
  keys:
    KUMA_API_KEY: KUMA_API_KEY
capability:
  consumes:
  - type: http
    namespace: kuma-meshtimeout
    baseUri: ''
    description: Kuma API — MeshTimeout business capability. Self-contained, no shared references.
    resources:
    - name: meshes-mesh-meshtimeouts
      path: /meshes/{mesh}/meshtimeouts
      operations:
      - name: getmeshtimeoutlist
        method: GET
        description: Returns a list of MeshTimeout in the mesh.
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: offset
          in: query
          type: integer
          description: offset in the list of entities
        - name: size
          in: query
          type: integer
          description: the number of items per page
        - name: filter
          in: query
          type: object
          description: filter by labels when multiple filters are present, they are ANDed
        - name: mesh
          in: path
          type: string
          description: name of the mesh
          required: true
    - name: meshes-mesh-meshtimeouts-name
      path: /meshes/{mesh}/meshtimeouts/{name}
      operations:
      - name: getmeshtimeout
        method: GET
        description: Returns MeshTimeout entity
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: mesh
          in: path
          type: string
          description: name of the mesh
          required: true
        - name: name
          in: path
          type: string
          description: name of the MeshTimeout
          required: true
      - name: putmeshtimeout
        method: PUT
        description: Creates or Updates MeshTimeout entity
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: mesh
          in: path
          type: string
          description: name of the mesh
          required: true
        - name: name
          in: path
          type: string
          description: name of the MeshTimeout
          required: true
        - name: body
          in: body
          type: object
          description: Request body (JSON).
          required: true
      - name: deletemeshtimeout
        method: DELETE
        description: Deletes MeshTimeout entity
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: mesh
          in: path
          type: string
          description: name of the mesh
          required: true
        - name: name
          in: path
          type: string
          description: name of the MeshTimeout
          required: true
    authentication:
      type: bearer
      token: '{{env.KUMA_API_KEY}}'
  exposes:
  - type: rest
    namespace: kuma-meshtimeout-rest
    port: 8080
    description: REST adapter for Kuma API — MeshTimeout. One Spectral-compliant resource per consumed operation, prefixed
      with /v1.
    resources:
    - path: /v1/meshes/{mesh}/meshtimeouts
      name: meshes-mesh-meshtimeouts
      description: REST surface for meshes-mesh-meshtimeouts.
      operations:
      - method: GET
        name: getmeshtimeoutlist
        description: Returns a list of MeshTimeout in the mesh.
        call: kuma-meshtimeout.getmeshtimeoutlist
        with:
          offset: rest.offset
          size: rest.size
          filter: rest.filter
          mesh: rest.mesh
        outputParameters:
        - type: object
          mapping: $.
    - path: /v1/meshes/{mesh}/meshtimeouts/{name}
      name: meshes-mesh-meshtimeouts-name
      description: REST surface for meshes-mesh-meshtimeouts-name.
      operations:
      - method: GET
        name: getmeshtimeout
        description: Returns MeshTimeout entity
        call: kuma-meshtimeout.getmeshtimeout
        with:
          mesh: rest.mesh
          name: rest.name
        outputParameters:
        - type: object
          mapping: $.
      - method: PUT
        name: putmeshtimeout
        description: Creates or Updates MeshTimeout entity
        call: kuma-meshtimeout.putmeshtimeout
        with:
          mesh: rest.mesh
          name: rest.name
          body: rest.body
        outputParameters:
        - type: object
          mapping: $.
      - method: DELETE
        name: deletemeshtimeout
        description: Deletes MeshTimeout entity
        call: kuma-meshtimeout.deletemeshtimeout
        with:
          mesh: rest.mesh
          name: rest.name
        outputParameters:
        - type: object
          mapping: $.
  - type: mcp
    namespace: kuma-meshtimeout-mcp
    port: 9090
    transport: http
    description: MCP adapter for Kuma API — MeshTimeout. One tool per consumed operation, routed inline through this capability's
      consumes block.
    tools:
    - name: returns-list-meshtimeout-mesh
      description: Returns a list of MeshTimeout in the mesh.
      hints:
        readOnly: true
        destructive: false
        idempotent: true
      call: kuma-meshtimeout.getmeshtimeoutlist
      with:
        offset: tools.offset
        size: tools.size
        filter: tools.filter
        mesh: tools.mesh
      outputParameters:
      - type: object
        mapping: $.
    - name: returns-meshtimeout-entity
      description: Returns MeshTimeout entity
      hints:
        readOnly: true
        destructive: false
        idempotent: true
      call: kuma-meshtimeout.getmeshtimeout
      with:
        mesh: tools.mesh
        name: tools.name
      outputParameters:
      - type: object
        mapping: $.
    - name: creates-updates-meshtimeout-entity
      description: Creates or Updates MeshTimeout entity
      hints:
        readOnly: false
        destructive: false
        idempotent: true
      call: kuma-meshtimeout.putmeshtimeout
      with:
        mesh: tools.mesh
        name: tools.name
        body: tools.body
      outputParameters:
      - type: object
        mapping: $.
    - name: deletes-meshtimeout-entity
      description: Deletes MeshTimeout entity
      hints:
        readOnly: false
        destructive: true
        idempotent: true
      call: kuma-meshtimeout.deletemeshtimeout
      with:
        mesh: tools.mesh
        name: tools.name
      outputParameters:
      - type: object
        mapping: $.
