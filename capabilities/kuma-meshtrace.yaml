naftiko: 1.0.0-alpha2
info:
  label: Kuma API — MeshTrace
  description: 'Kuma API — MeshTrace. 4 operations. Lead operation: Returns a list of MeshTrace in the mesh.. Self-contained
    Naftiko capability covering one Kuma business surface.'
  tags:
  - Kuma
  - MeshTrace
  created: '2026-05-19'
  modified: '2026-05-19'
binds:
- namespace: env
  keys:
    KUMA_API_KEY: KUMA_API_KEY
capability:
  consumes:
  - type: http
    namespace: kuma-meshtrace
    baseUri: ''
    description: Kuma API — MeshTrace business capability. Self-contained, no shared references.
    resources:
    - name: meshes-mesh-meshtraces
      path: /meshes/{mesh}/meshtraces
      operations:
      - name: getmeshtracelist
        method: GET
        description: Returns a list of MeshTrace in the mesh.
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: offset
          in: query
          type: integer
          description: offset in the list of entities
        - name: size
          in: query
          type: integer
          description: the number of items per page
        - name: filter
          in: query
          type: object
          description: filter by labels when multiple filters are present, they are ANDed
        - name: mesh
          in: path
          type: string
          description: name of the mesh
          required: true
    - name: meshes-mesh-meshtraces-name
      path: /meshes/{mesh}/meshtraces/{name}
      operations:
      - name: getmeshtrace
        method: GET
        description: Returns MeshTrace entity
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: mesh
          in: path
          type: string
          description: name of the mesh
          required: true
        - name: name
          in: path
          type: string
          description: name of the MeshTrace
          required: true
      - name: putmeshtrace
        method: PUT
        description: Creates or Updates MeshTrace entity
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: mesh
          in: path
          type: string
          description: name of the mesh
          required: true
        - name: name
          in: path
          type: string
          description: name of the MeshTrace
          required: true
        - name: body
          in: body
          type: object
          description: Request body (JSON).
          required: true
      - name: deletemeshtrace
        method: DELETE
        description: Deletes MeshTrace entity
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: mesh
          in: path
          type: string
          description: name of the mesh
          required: true
        - name: name
          in: path
          type: string
          description: name of the MeshTrace
          required: true
    authentication:
      type: bearer
      token: '{{env.KUMA_API_KEY}}'
  exposes:
  - type: rest
    namespace: kuma-meshtrace-rest
    port: 8080
    description: REST adapter for Kuma API — MeshTrace. One Spectral-compliant resource per consumed operation, prefixed with
      /v1.
    resources:
    - path: /v1/meshes/{mesh}/meshtraces
      name: meshes-mesh-meshtraces
      description: REST surface for meshes-mesh-meshtraces.
      operations:
      - method: GET
        name: getmeshtracelist
        description: Returns a list of MeshTrace in the mesh.
        call: kuma-meshtrace.getmeshtracelist
        with:
          offset: rest.offset
          size: rest.size
          filter: rest.filter
          mesh: rest.mesh
        outputParameters:
        - type: object
          mapping: $.
    - path: /v1/meshes/{mesh}/meshtraces/{name}
      name: meshes-mesh-meshtraces-name
      description: REST surface for meshes-mesh-meshtraces-name.
      operations:
      - method: GET
        name: getmeshtrace
        description: Returns MeshTrace entity
        call: kuma-meshtrace.getmeshtrace
        with:
          mesh: rest.mesh
          name: rest.name
        outputParameters:
        - type: object
          mapping: $.
      - method: PUT
        name: putmeshtrace
        description: Creates or Updates MeshTrace entity
        call: kuma-meshtrace.putmeshtrace
        with:
          mesh: rest.mesh
          name: rest.name
          body: rest.body
        outputParameters:
        - type: object
          mapping: $.
      - method: DELETE
        name: deletemeshtrace
        description: Deletes MeshTrace entity
        call: kuma-meshtrace.deletemeshtrace
        with:
          mesh: rest.mesh
          name: rest.name
        outputParameters:
        - type: object
          mapping: $.
  - type: mcp
    namespace: kuma-meshtrace-mcp
    port: 9090
    transport: http
    description: MCP adapter for Kuma API — MeshTrace. One tool per consumed operation, routed inline through this capability's
      consumes block.
    tools:
    - name: returns-list-meshtrace-mesh
      description: Returns a list of MeshTrace in the mesh.
      hints:
        readOnly: true
        destructive: false
        idempotent: true
      call: kuma-meshtrace.getmeshtracelist
      with:
        offset: tools.offset
        size: tools.size
        filter: tools.filter
        mesh: tools.mesh
      outputParameters:
      - type: object
        mapping: $.
    - name: returns-meshtrace-entity
      description: Returns MeshTrace entity
      hints:
        readOnly: true
        destructive: false
        idempotent: true
      call: kuma-meshtrace.getmeshtrace
      with:
        mesh: tools.mesh
        name: tools.name
      outputParameters:
      - type: object
        mapping: $.
    - name: creates-updates-meshtrace-entity
      description: Creates or Updates MeshTrace entity
      hints:
        readOnly: false
        destructive: false
        idempotent: true
      call: kuma-meshtrace.putmeshtrace
      with:
        mesh: tools.mesh
        name: tools.name
        body: tools.body
      outputParameters:
      - type: object
        mapping: $.
    - name: deletes-meshtrace-entity
      description: Deletes MeshTrace entity
      hints:
        readOnly: false
        destructive: true
        idempotent: true
      call: kuma-meshtrace.deletemeshtrace
      with:
        mesh: tools.mesh
        name: tools.name
      outputParameters:
      - type: object
        mapping: $.
