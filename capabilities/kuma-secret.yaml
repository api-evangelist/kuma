naftiko: 1.0.0-alpha2
info:
  label: Kuma API — Secret
  description: 'Kuma API — Secret. 4 operations. Lead operation: Returns a list of Secret in the mesh.. Self-contained Naftiko
    capability covering one Kuma business surface.'
  tags:
  - Kuma
  - Secret
  created: '2026-05-19'
  modified: '2026-05-19'
binds:
- namespace: env
  keys:
    KUMA_API_KEY: KUMA_API_KEY
capability:
  consumes:
  - type: http
    namespace: kuma-secret
    baseUri: ''
    description: Kuma API — Secret business capability. Self-contained, no shared references.
    resources:
    - name: meshes-mesh-secrets
      path: /meshes/{mesh}/secrets
      operations:
      - name: getsecretlist
        method: GET
        description: Returns a list of Secret in the mesh.
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: offset
          in: query
          type: integer
          description: offset in the list of entities
        - name: size
          in: query
          type: integer
          description: the number of items per page
        - name: filter
          in: query
          type: object
          description: filter by labels when multiple filters are present, they are ANDed
        - name: mesh
          in: path
          type: string
          description: name of the mesh
          required: true
    - name: meshes-mesh-secrets-name
      path: /meshes/{mesh}/secrets/{name}
      operations:
      - name: deletesecret
        method: DELETE
        description: Deletes Secret entity
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: mesh
          in: path
          type: string
          description: name of the mesh
          required: true
        - name: name
          in: path
          type: string
          description: name of the Secret
          required: true
      - name: getsecret
        method: GET
        description: Returns Secret entity
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: mesh
          in: path
          type: string
          description: name of the mesh
          required: true
        - name: name
          in: path
          type: string
          description: name of the Secret
          required: true
      - name: putsecret
        method: PUT
        description: Creates or Updates Secret entity
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: mesh
          in: path
          type: string
          description: name of the mesh
          required: true
        - name: name
          in: path
          type: string
          description: name of the Secret
          required: true
        - name: body
          in: body
          type: object
          description: Request body (JSON).
          required: true
    authentication:
      type: bearer
      token: '{{env.KUMA_API_KEY}}'
  exposes:
  - type: rest
    namespace: kuma-secret-rest
    port: 8080
    description: REST adapter for Kuma API — Secret. One Spectral-compliant resource per consumed operation, prefixed with
      /v1.
    resources:
    - path: /v1/meshes/{mesh}/secrets
      name: meshes-mesh-secrets
      description: REST surface for meshes-mesh-secrets.
      operations:
      - method: GET
        name: getsecretlist
        description: Returns a list of Secret in the mesh.
        call: kuma-secret.getsecretlist
        with:
          offset: rest.offset
          size: rest.size
          filter: rest.filter
          mesh: rest.mesh
        outputParameters:
        - type: object
          mapping: $.
    - path: /v1/meshes/{mesh}/secrets/{name}
      name: meshes-mesh-secrets-name
      description: REST surface for meshes-mesh-secrets-name.
      operations:
      - method: DELETE
        name: deletesecret
        description: Deletes Secret entity
        call: kuma-secret.deletesecret
        with:
          mesh: rest.mesh
          name: rest.name
        outputParameters:
        - type: object
          mapping: $.
      - method: GET
        name: getsecret
        description: Returns Secret entity
        call: kuma-secret.getsecret
        with:
          mesh: rest.mesh
          name: rest.name
        outputParameters:
        - type: object
          mapping: $.
      - method: PUT
        name: putsecret
        description: Creates or Updates Secret entity
        call: kuma-secret.putsecret
        with:
          mesh: rest.mesh
          name: rest.name
          body: rest.body
        outputParameters:
        - type: object
          mapping: $.
  - type: mcp
    namespace: kuma-secret-mcp
    port: 9090
    transport: http
    description: MCP adapter for Kuma API — Secret. One tool per consumed operation, routed inline through this capability's
      consumes block.
    tools:
    - name: returns-list-secret-mesh
      description: Returns a list of Secret in the mesh.
      hints:
        readOnly: true
        destructive: false
        idempotent: true
      call: kuma-secret.getsecretlist
      with:
        offset: tools.offset
        size: tools.size
        filter: tools.filter
        mesh: tools.mesh
      outputParameters:
      - type: object
        mapping: $.
    - name: deletes-secret-entity
      description: Deletes Secret entity
      hints:
        readOnly: false
        destructive: true
        idempotent: true
      call: kuma-secret.deletesecret
      with:
        mesh: tools.mesh
        name: tools.name
      outputParameters:
      - type: object
        mapping: $.
    - name: returns-secret-entity
      description: Returns Secret entity
      hints:
        readOnly: true
        destructive: false
        idempotent: true
      call: kuma-secret.getsecret
      with:
        mesh: tools.mesh
        name: tools.name
      outputParameters:
      - type: object
        mapping: $.
    - name: creates-updates-secret-entity
      description: Creates or Updates Secret entity
      hints:
        readOnly: false
        destructive: false
        idempotent: true
      call: kuma-secret.putsecret
      with:
        mesh: tools.mesh
        name: tools.name
        body: tools.body
      outputParameters:
      - type: object
        mapping: $.
