naftiko: 1.0.0-alpha2
info:
  label: Kuma API — MeshTLS
  description: 'Kuma API — MeshTLS. 4 operations. Lead operation: Returns a list of MeshTLS in the mesh.. Self-contained Naftiko
    capability covering one Kuma business surface.'
  tags:
  - Kuma
  - MeshTLS
  created: '2026-05-19'
  modified: '2026-05-19'
binds:
- namespace: env
  keys:
    KUMA_API_KEY: KUMA_API_KEY
capability:
  consumes:
  - type: http
    namespace: kuma-meshtls
    baseUri: ''
    description: Kuma API — MeshTLS business capability. Self-contained, no shared references.
    resources:
    - name: meshes-mesh-meshtlses
      path: /meshes/{mesh}/meshtlses
      operations:
      - name: getmeshtlslist
        method: GET
        description: Returns a list of MeshTLS in the mesh.
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: offset
          in: query
          type: integer
          description: offset in the list of entities
        - name: size
          in: query
          type: integer
          description: the number of items per page
        - name: filter
          in: query
          type: object
          description: filter by labels when multiple filters are present, they are ANDed
        - name: mesh
          in: path
          type: string
          description: name of the mesh
          required: true
    - name: meshes-mesh-meshtlses-name
      path: /meshes/{mesh}/meshtlses/{name}
      operations:
      - name: getmeshtls
        method: GET
        description: Returns MeshTLS entity
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: mesh
          in: path
          type: string
          description: name of the mesh
          required: true
        - name: name
          in: path
          type: string
          description: name of the MeshTLS
          required: true
      - name: putmeshtls
        method: PUT
        description: Creates or Updates MeshTLS entity
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: mesh
          in: path
          type: string
          description: name of the mesh
          required: true
        - name: name
          in: path
          type: string
          description: name of the MeshTLS
          required: true
        - name: body
          in: body
          type: object
          description: Request body (JSON).
          required: true
      - name: deletemeshtls
        method: DELETE
        description: Deletes MeshTLS entity
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: mesh
          in: path
          type: string
          description: name of the mesh
          required: true
        - name: name
          in: path
          type: string
          description: name of the MeshTLS
          required: true
    authentication:
      type: bearer
      token: '{{env.KUMA_API_KEY}}'
  exposes:
  - type: rest
    namespace: kuma-meshtls-rest
    port: 8080
    description: REST adapter for Kuma API — MeshTLS. One Spectral-compliant resource per consumed operation, prefixed with
      /v1.
    resources:
    - path: /v1/meshes/{mesh}/meshtlses
      name: meshes-mesh-meshtlses
      description: REST surface for meshes-mesh-meshtlses.
      operations:
      - method: GET
        name: getmeshtlslist
        description: Returns a list of MeshTLS in the mesh.
        call: kuma-meshtls.getmeshtlslist
        with:
          offset: rest.offset
          size: rest.size
          filter: rest.filter
          mesh: rest.mesh
        outputParameters:
        - type: object
          mapping: $.
    - path: /v1/meshes/{mesh}/meshtlses/{name}
      name: meshes-mesh-meshtlses-name
      description: REST surface for meshes-mesh-meshtlses-name.
      operations:
      - method: GET
        name: getmeshtls
        description: Returns MeshTLS entity
        call: kuma-meshtls.getmeshtls
        with:
          mesh: rest.mesh
          name: rest.name
        outputParameters:
        - type: object
          mapping: $.
      - method: PUT
        name: putmeshtls
        description: Creates or Updates MeshTLS entity
        call: kuma-meshtls.putmeshtls
        with:
          mesh: rest.mesh
          name: rest.name
          body: rest.body
        outputParameters:
        - type: object
          mapping: $.
      - method: DELETE
        name: deletemeshtls
        description: Deletes MeshTLS entity
        call: kuma-meshtls.deletemeshtls
        with:
          mesh: rest.mesh
          name: rest.name
        outputParameters:
        - type: object
          mapping: $.
  - type: mcp
    namespace: kuma-meshtls-mcp
    port: 9090
    transport: http
    description: MCP adapter for Kuma API — MeshTLS. One tool per consumed operation, routed inline through this capability's
      consumes block.
    tools:
    - name: returns-list-meshtls-mesh
      description: Returns a list of MeshTLS in the mesh.
      hints:
        readOnly: true
        destructive: false
        idempotent: true
      call: kuma-meshtls.getmeshtlslist
      with:
        offset: tools.offset
        size: tools.size
        filter: tools.filter
        mesh: tools.mesh
      outputParameters:
      - type: object
        mapping: $.
    - name: returns-meshtls-entity
      description: Returns MeshTLS entity
      hints:
        readOnly: true
        destructive: false
        idempotent: true
      call: kuma-meshtls.getmeshtls
      with:
        mesh: tools.mesh
        name: tools.name
      outputParameters:
      - type: object
        mapping: $.
    - name: creates-updates-meshtls-entity
      description: Creates or Updates MeshTLS entity
      hints:
        readOnly: false
        destructive: false
        idempotent: true
      call: kuma-meshtls.putmeshtls
      with:
        mesh: tools.mesh
        name: tools.name
        body: tools.body
      outputParameters:
      - type: object
        mapping: $.
    - name: deletes-meshtls-entity
      description: Deletes MeshTLS entity
      hints:
        readOnly: false
        destructive: true
        idempotent: true
      call: kuma-meshtls.deletemeshtls
      with:
        mesh: tools.mesh
        name: tools.name
      outputParameters:
      - type: object
        mapping: $.
