  - type: http
    namespace: kuma
    baseUri: https://api.example.com
    description: Kuma API HTTP API.
    authentication:
      type: basic
      username: '{{KUMA_USERNAME}}'
      password: '{{KUMA_PASSWORD}}'
    resources:
    - name: resource
      path: /
      operations:
      - name: index
        method: GET
        description: The index endpoint
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
    - name: resources
      path: /_resources
      operations:
